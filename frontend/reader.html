<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>阅读 - 小说浏览器</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/reader.css">
</head>
<body>
  <div id="reader-topbar" class="reader-bar reader-topbar">
    <button class="reader-bar-btn" id="reader-back">←</button>
    <span id="reader-title" class="reader-bar-title"></span>
    <button class="reader-bar-btn" id="reader-menu">☰</button>
  </div>

  <div id="reader-wrapper">
    <div id="reader-content"></div>
  </div>

  <div id="reader-bottombar" class="reader-bar reader-bottombar">
    <div class="bar-row">
      <button id="btn-prev" class="bar-btn">◀ 上一章</button>
      <button id="btn-next" class="bar-btn">下一章 ▶</button>
    </div>
    <div class="bar-row bar-mid">
      <button id="btn-font-down" class="bar-btn-sm">A−</button>
      <span class="bar-label">18</span>
      <button id="btn-font-up" class="bar-btn-sm">A+</button>
      <button id="btn-theme" class="bar-btn-sm">☀</button>
      <button id="btn-mode" class="bar-btn-sm">📜</button>
      <button id="btn-tts" class="bar-btn-sm">🔊</button>
    </div>
    <div id="tts-row" class="bar-row" style="display:none">
      <button id="tts-play" class="bar-btn-sm">▶</button>
      <input type="range" id="tts-rate" min="5" max="20" value="10" class="bar-slider">
      <button id="tts-stop" class="bar-btn-sm">✕ 关闭</button>
    </div>
    <div class="bar-row">
      <span id="reader-chapter-info"></span>
      <span id="reader-progress-pct">0%</span>
    </div>
  </div>

  <div id="reader-sidebar">
    <div class="sidebar-tabs">
      <span class="sidebar-tab active" data-tab="toc">目录</span>
      <span class="sidebar-tab" data-tab="bookmarks">书签</span>
    </div>
    <div id="sidebar-toc" class="sidebar-list"></div>
    <div id="sidebar-bookmarks" class="sidebar-list" style="display:none"></div>
  </div>

  <div id="reader-overlay"></div>

  <script src="js/utils.js"></script>
  <script src="js/db.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cache.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/reader.js"></script>
</body>
</html>

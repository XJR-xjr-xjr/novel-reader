 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
   <meta name="apple-mobile-web-app-capable" content="yes">
   <link rel="manifest" href="manifest.json">
   <title>小说浏览器</title>
   <link rel="stylesheet" href="css/theme.css">
   <link rel="stylesheet" href="css/style.css">
   <link rel="stylesheet" href="css/bookshelf.css">
 </head>
 <body>
   <!-- 书架页面 -->
   <div id="page-bookshelf" class="page active">
     <div class="header">
       <h1>书架</h1>
     </div>
     <div class="bookshelf-header">
       <div class="search-bar">
         <input type="text" id="search-input" placeholder="搜索小说..." autocomplete="off">
         <button class="search-btn" id="search-btn">搜索</button>
       </div>
     </div>
     <div id="bookshelf-list" class="bookshelf-list"></div>
     <div id="bookshelf-empty" class="empty-state">
       <p>书架空空如也</p>
       <p style="font-size:13px;margin-top:4px;color:var(--text-secondary)">搜索并添加你正在追的小说</p>
     </div>
   </div>
 
   <script src="js/utils.js"></script>
   <script src="js/db.js"></script>
   <script src="js/api.js"></script>
   <script src="js/cache.js"></script>
   <script src="js/bookshelf.js"></script>
   <script src="js/app.js"></script>
 </body>
 </html>
